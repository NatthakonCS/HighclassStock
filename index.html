<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighClass - สินค้าพร้อมส่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; overflow-x: hidden; }
        /* สไตล์ตอนกำลังโหลดรูป */
        .img-loading { background: #f3f4f6 url('https://placehold.co/400x500/F3F4F6/CCCCCC?text=Loading...') no-repeat center center; }
    </style>
</head>
<body class="bg-gray-100"> 

    <nav class="bg-black text-white p-4 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="openSidebar()" class="text-white hover:text-gray-300">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-2xl font-bold tracking-widest uppercase">HighClass</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <p class="text-sm text-gray-400 hidden md:block">Available Items</p>
                <button onclick="openLoginModal()" class="text-xs text-white opacity-0 hover:opacity-100 transition-opacity cursor-pointer">Admin</button>
            </div>
        </div>
    </nav>

    <div id="sidebar-overlay" onclick="closeSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300">
        <div class="p-5 flex justify-between items-center border-b">
            <h2 class="text-lg font-bold">หมวดหมู่สินค้า</h2>
            <button onclick="closeSidebar()" class="text-gray-500 hover:text-red-500 text-xl font-bold">&times;</button>
        </div>
        <ul class="p-4 space-y-4">
            <li><button onclick="filterCategory('ทั้งหมด')" class="block w-full text-left font-medium text-gray-700 hover:text-green-500">รวมสินค้าทั้งหมด</button></li>
            <li><button onclick="filterCategory('เสื้อฮู้ด')" class="block w-full text-left font-medium text-gray-700 hover:text-green-500">เสื้อฮู้ด</button></li>
            <li><button onclick="filterCategory('เสื้อ T-shirt')" class="block w-full text-left font-medium text-gray-700 hover:text-green-500">เสื้อ T-shirt</button></li>
            <li><button onclick="filterCategory('โปโล')" class="block w-full text-left font-medium text-gray-700 hover:text-green-500">โปโล</button></li>
        </ul>
    </div>

    <main class="max-w-6xl mx-auto p-4 mt-6 mb-12">
        <div id="loading" class="text-center py-10 text-gray-500">กำลังโหลดรายการสินค้า...</div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
        
        <div id="load-more-container" class="text-center mt-8 hidden">
            <button onclick="loadMore()" class="px-6 py-2 bg-gray-200 text-gray-700 font-semibold rounded-full hover:bg-gray-300 transition">
                ดูสินค้าเพิ่มเติม
            </button>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg shadow-xl w-80 text-center">
            <h2 class="text-xl font-bold mb-4">Admin Login</h2>
            <input type="password" id="admin-password" placeholder="ใส่รหัสผ่าน" class="w-full border p-2 rounded mb-4 text-center focus:outline-none focus:ring-2 focus:ring-black">
            <div class="flex gap-2 justify-center">
                <button onclick="closeLoginModal()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 transition">ยกเลิก</button>
                <button id="login-btn" onclick="checkPassword()" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800 transition">เข้าสู่ระบบ</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-2 hidden">รหัสผ่านไม่ถูกต้อง!</p>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">➕ เพิ่มสินค้าใหม่</h2>
                <button onclick="closeAdminModal()" class="text-gray-500 hover:text-red-500 font-bold">&times;</button>
            </div>
            
            <form id="add-product-form" class="space-y-4">
                <div><label class="block text-sm font-semibold text-gray-700">ชื่อสินค้า</label><input type="text" id="add-name" required class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-semibold text-gray-700">ไซส์</label><input type="text" id="add-size" required class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm font-semibold text-gray-700">ราคา</label><input type="number" id="add-price" required class="w-full border p-2 rounded"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">หมวดหมู่</label>
                        <select id="add-category" class="w-full border p-2 rounded bg-white">
                            <option value="เสื้อฮู้ด">เสื้อฮู้ด</option>
                            <option value="เสื้อ T-shirt">เสื้อ T-shirt</option>
                            <option value="โปโล">โปโล</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">สถานะ</label>
                        <select id="add-status" class="w-full border p-2 rounded bg-white"><option value="ว่าง">ว่าง</option></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">อัปโหลดรูปภาพ</label>
                    <input type="file" id="add-image" accept="image/*" required class="w-full border p-2 rounded text-sm">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-green-500 text-white font-bold py-3 rounded hover:bg-green-600 transition mt-4">บันทึกสินค้าลงเว็บ</button>
            </form>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // ⭐ ใส่ URL API ตรงนี้ (ใช้ URL ตัวเดิมที่ได้ตอนซ่อนรหัสผ่าน)
        const API_URL = 'https://script.google.com/macros/s/AKfycbwrX0D60jb_bKVeBBdJX0XpvFc1fJA924n3fnkN9v1LwdXddwuoLnOu6rTi8OS9c1QA/exec';
        // ----------------------------------------------------
        
        let allProducts = []; 
        let currentSessionPassword = ""; 
        
        // ตัวแปรสำหรับระบบแบ่งหน้า (Load More)
        let currentFilteredProducts = [];
        let itemsDisplayed = 0;
        const ITEMS_PER_PAGE = 12; // โชว์ทีละ 12 ชิ้น

        async function fetchProducts() {
            try {
                // เช็คว่ามีข้อมูล Cache ไหม (จะได้ไม่ต้องโหลดใหม่ถ้าเพิ่งเคยเข้า)
                const cachedData = sessionStorage.getItem('highclass_products');
                
                if (cachedData) {
                    allProducts = JSON.parse(cachedData);
                    document.getElementById('loading').style.display = 'none'; 
                    filterCategory('ทั้งหมด');
                } else {
                    const response = await fetch(API_URL);
                    allProducts = await response.json(); 
                    // เก็บข้อมูลไว้ในเครื่องลูกค้าชั่วคราว
                    sessionStorage.setItem('highclass_products', JSON.stringify(allProducts));
                    
                    document.getElementById('loading').style.display = 'none'; 
                    filterCategory('ทั้งหมด');
                }
            } catch (error) {
                document.getElementById('loading').innerText = 'ไม่สามารถโหลดข้อมูลได้';
            }
        }

        // ฟังก์ชันเริ่มวาดสินค้า
        function renderProducts(reset = true) {
            const grid = document.getElementById('product-grid');
            const loadMoreBtn = document.getElementById('load-more-container');

            // ถ้ากดล้างค่า (เปลี่ยนหมวดหมู่) ให้ล้างจอและเริ่มนับ 0 ใหม่
            if (reset) {
                grid.innerHTML = ''; 
                itemsDisplayed = 0;
            }

            if (currentFilteredProducts.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-10">ไม่มีสินค้าในหมวดหมู่นี้</p>'; 
                loadMoreBtn.classList.add('hidden');
                return;
            }

            // ตัดข้อมูลมาแค่ทีละ 12 ชิ้น
            const chunk = currentFilteredProducts.slice(itemsDisplayed, itemsDisplayed + ITEMS_PER_PAGE);

            chunk.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white rounded-lg shadow-sm flex flex-col border border-gray-200">
                        <img src="${item.image}" loading="lazy" alt="${item.name}" class="img-loading w-full h-48 md:h-64 object-cover">
                        <div class="p-4 flex flex-col flex-grow">
                            <h2 class="text-gray-800 font-semibold text-sm md:text-base">${item.name}</h2>
                            <p class="text-gray-500 text-xs mt-1">Size: ${item.size}</p>
                            <p class="text-black font-bold text-lg mt-2 mb-4">฿${item.price}</p>
                            <a href="https://ig.me/m/highclass.2hand" target="_blank" class="mt-auto block w-full bg-green-500 hover:bg-green-600 text-white text-center py-2 rounded-md font-semibold text-sm">สนใจสินค้า</a>
                        </div>
                    </div>`;
            });

            itemsDisplayed += chunk.length;

            // เช็คว่าของหมดหมวดหมู่หรือยัง ถ้ายังให้โชว์ปุ่ม "โหลดเพิ่มเติม"
            if (itemsDisplayed < currentFilteredProducts.length) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        function loadMore() {
            renderProducts(false); // เรียกวาดสินค้าต่อโดยไม่ล้างจอ
        }

        function filterCategory(cat) {
            // กรองหมวดหมู่ แล้วสั่งให้วาดใหม่ตั้งแต่ต้น
            currentFilteredProducts = cat === 'ทั้งหมด' ? allProducts : allProducts.filter(i => i.category === cat);
            renderProducts(true);
            closeSidebar(); 
        }

        function openSidebar() { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sidebar-overlay').classList.remove('hidden'); }
        function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sidebar-overlay').classList.add('hidden'); }

        // --- ระบบ ADMIN JS (เหมือนเดิม) ---
        function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLoginModal() { 
            document.getElementById('login-modal').classList.add('hidden'); 
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('admin-password').value = '';
        }

        async function checkPassword() {
            const pwdInput = document.getElementById('admin-password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('login-error');
            
            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', password: pwdInput })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    currentSessionPassword = pwdInput; 
                    closeLoginModal();
                    document.getElementById('admin-modal').classList.remove('hidden');
                } else {
                    errorMsg.innerText = "รหัสผ่านไม่ถูกต้อง!";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
                errorMsg.classList.remove('hidden');
            }
            
            btn.innerText = "เข้าสู่ระบบ";
            btn.disabled = false;
        }

        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }

        document.getElementById('add-product-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'กำลังอัปโหลดรูปและบันทึกข้อมูล...';
            btn.disabled = true;
            btn.classList.replace('bg-green-500', 'bg-gray-400');

            const file = document.getElementById('add-image').files[0];
            const reader = new FileReader();
            
            reader.onload = async function() {
                const payload = {
                    action: 'addProduct', 
                    password: currentSessionPassword, 
                    name: document.getElementById('add-name').value,
                    size: document.getElementById('add-size').value,
                    price: document.getElementById('add-price').value,
                    category: document.getElementById('add-category').value,
                    status: document.getElementById('add-status').value,
                    fileName: file.name,
                    mimeType: file.type,
                    fileBase64: reader.result
                };

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if(data.status === "success") {
                        // **สำคัญ**: ล้าง Cache ทิ้งเวลามีสินค้าใหม่เข้ามา ข้อมูลจะได้อัปเดตทันที
                        sessionStorage.removeItem('highclass_products');
                        alert('เพิ่มสินค้าสำเร็จ! โหลดหน้าเว็บใหม่เพื่อดูผลลัพธ์');
                        window.location.reload(); 
                    } else {
                        alert('Error: ' + data.message);
                        btn.innerText = 'บันทึกสินค้าลงเว็บ';
                        btn.disabled = false;
                        btn.classList.replace('bg-gray-400', 'bg-green-500');
                    }
                } catch (error) {
                    alert('เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่');
                    btn.innerText = 'บันทึกสินค้าลงเว็บ';
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-400', 'bg-green-500');
                }
            };
            
            reader.readAsDataURL(file); 
        });

        fetchProducts();
    </script>
</body>
</html>
